<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>FitPet</title>
  <link rel="stylesheet" href="pet.css">
</head>
<body>
  <div class="pet-container" id="pet-container">
    <div class="pet-sprite egg" id="pet-sprite"></div>

    <div class="pet-info">
      <div id="realm-level">第一境界 · Lv.1</div>
      <div class="progress-bar">
        <div class="fill" id="progress-fill" style="width: 0%"></div>
      </div>
    </div>

    <div class="expand-panel" id="expand-panel">
      <div class="detail-item">📅 连续打卡：<span id="streak">0</span> 天</div>
      <div class="detail-item">📊 今日完成：<span id="today-rate">0%</span></div>
      <div id="exercise-details"></div>
      <button id="start-workout-btn">🏋️ 开始运动</button>
    </div>
  </div>

  <script src="pet.js" type="module"></script>
</body>
</html>
