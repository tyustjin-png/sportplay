<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>FitPet 运动</title>
  <link rel="stylesheet" href="workout.css">
</head>
<body>
  <div class="camera-panel">
    <video id="camera" autoplay playsinline></video>
    <canvas id="skeleton"></canvas>
    <div class="counter-overlay" id="counter">准备开始</div>
  </div>

  <div class="plan-panel">
    <h2>📋 今日计划</h2>
    <div id="plan-list"></div>

    <div class="kegel-timer" id="kegel-panel" style="display:none;">
      <p>凯格尔训练</p>
      <div class="countdown" id="kegel-countdown">10</div>
      <button id="kegel-start-btn">开始一组</button>
    </div>
  </div>

  <script src="workout.js" type="module"></script>
</body>
</html>
